<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}PostForge{% endblock %} — {{ app_name }}</title>
  <style>
    :root {
      --primary:   #0057FF;
      --secondary: #00D4FF;
      --accent:    #00FF88;
      --dark:      #080C18;
      --surface:   #0F1629;
      --surface2:  #1A2240;
      --text:      #E8EEFF;
      --text-muted:#8A9BC5;
      --danger:    #FF4466;
      --warning:   #FFAA00;
      --success:   #00FF88;
      --radius:    10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Navbar ── */
    .navbar {
      background: var(--surface);
      border-bottom: 1px solid rgba(0, 87, 255, 0.3);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .navbar-brand {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--secondary);
      text-decoration: none;
      letter-spacing: 0.05em;
    }
    .navbar-brand span { color: var(--accent); }
    .navbar-links a {
      color: var(--text-muted);
      text-decoration: none;
      margin-left: 1.5rem;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .navbar-links a:hover { color: var(--secondary); }

    /* ── Container ── */
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid rgba(0, 87, 255, 0.2);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .card-header {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.75rem;
    }

    /* ── Status Badges ── */
    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge-pending       { background: rgba(138, 155, 197, 0.2); color: #8A9BC5; }
    .badge-analyzing     { background: rgba(0, 212, 255, 0.15);  color: #00D4FF; }
    .badge-generating_copy  { background: rgba(255, 170, 0, 0.15);  color: #FFAA00; }
    .badge-generating_image { background: rgba(255, 170, 0, 0.2);   color: #FFAA00; }
    .badge-review        { background: rgba(0, 87, 255, 0.2);   color: #6699FF; }
    .badge-approved      { background: rgba(0, 255, 136, 0.15); color: #00FF88; }
    .badge-published     { background: rgba(0, 255, 136, 0.25); color: #00FF88; }
    .badge-failed        { background: rgba(255, 68, 102, 0.2);  color: #FF4466; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.2rem;
      border: none;
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-primary  { background: var(--primary); color: #fff; }
    .btn-accent   { background: var(--accent); color: var(--dark); }
    .btn-danger   { background: var(--danger); color: #fff; }
    .btn-ghost    { background: var(--surface2); color: var(--text); }
    .btn-sm       { padding: 0.35rem 0.85rem; font-size: 0.8rem; }

    /* ── Form elements ── */
    input, select, textarea {
      background: var(--surface2);
      border: 1px solid rgba(0, 87, 255, 0.3);
      border-radius: var(--radius);
      color: var(--text);
      padding: 0.6rem 0.9rem;
      font-size: 0.9rem;
      width: 100%;
      transition: border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--secondary);
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.4rem;
    }
    .form-group { margin-bottom: 1rem; }

    /* ── Grid ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }

    /* ── Utilities ── */
    .text-muted    { color: var(--text-muted); font-size: 0.875rem; }
    .text-accent   { color: var(--accent); }
    .text-primary  { color: var(--secondary); }
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mt-3 { margin-top: 1.5rem; }
    .mb-1 { margin-bottom: 0.5rem; }
    .mb-2 { margin-bottom: 1rem; }
    .flex { display: flex; }
    .flex-center { display: flex; align-items: center; }
    .gap-1 { gap: 0.5rem; }
    .gap-2 { gap: 1rem; }
    .justify-between { justify-content: space-between; }

    /* ── Alert ── */
    .alert {
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }
    .alert-error   { background: rgba(255, 68, 102, 0.15); border: 1px solid rgba(255,68,102,0.3); color: #FF8899; }
    .alert-success { background: rgba(0, 255, 136, 0.1);  border: 1px solid rgba(0,255,136,0.3);  color: var(--accent); }
    .alert-info    { background: rgba(0, 87, 255, 0.1);   border: 1px solid rgba(0,87,255,0.3);   color: var(--secondary); }

    /* ── Code ── */
    .code-block {
      background: #020408;
      border: 1px solid rgba(0, 87, 255, 0.2);
      border-radius: var(--radius);
      padding: 1rem;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.85rem;
      color: #A8C5FF;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 300px;
      overflow-y: auto;
    }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/review" class="navbar-brand">Post<span>Forge</span></a>
    <div class="navbar-links">
      <a href="/review">Dashboard</a>
      <a href="/docs">API Docs</a>
      <a href="/health">Health</a>
    </div>
  </nav>

  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
